name: deepwiki
services:
  deepwiki:
    image: deepwiki:latest
    ports:
      - "3001:3001"
      - "8001:8001"
    environment:
      - PORT=${PORT:-8001}
      - WEB_PORT=${WEB_PORT:-3001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      # vLLM configuration (point to your intranet vLLM service)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://localhost:8000/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-not-needed}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8000/v1}
      # Offline / air-gapped settings
      - TIKTOKEN_CACHE_DIR=/app/tiktoken_cache
      - NEXT_TELEMETRY_DISABLED=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
    volumes:
      - ~/.adalflow:/root/.adalflow      # Persist repository and embedding data
    # Resource limits
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
