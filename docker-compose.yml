name: deepwiki
services:
  deepwiki:
    build: .
    image: deepwiki:latest
    ports:
      - "3001:3001"
      - "8001:8001"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - WEB_PORT=${WEB_PORT:-3001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - NEXT_PUBLIC_SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      # API keys & model configuration (from .env)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - EMBEDDER_TYPE=local
      - LOCAL_EMBEDDING_MODEL=${LOCAL_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - LOCAL_EMBEDDING_MODEL_PATH=${LOCAL_EMBEDDING_MODEL_PATH:-/root/.adalflow/hf_cache/hub/models--BAAI--bge-small-zh-v1.5/snapshots/7999e1d3359715c523056ef9478215996d62a620}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # vLLM configuration (point to your intranet vLLM service)
      - VLLM_API_KEY=${VLLM_API_KEY:-not-needed}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-}
      # Offline / air-gapped settings
      - TIKTOKEN_CACHE_DIR=/app/tiktoken_cache
      - SENTENCE_TRANSFORMERS_HOME=/root/.adalflow/models
      - HF_HOME=/root/.adalflow/hf_cache
      - NEXT_TELEMETRY_DISABLED=1
      # Use cached models offline; set to 0 only if you need to download models on first run
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
    volumes:
      - ~/.adalflow:/root/.adalflow      # Persist repo data, embeddings, and model cache
    # Resource limits
    # Note: network_mode: host is NOT used here because it breaks port publishing on Windows Docker Desktop.
    # For accessing intranet GitLab (e.g. 192.168.x.x:8081), add extra_hosts below, e.g.:
    # extra_hosts:
    #   - "mygitlab.local:192.168.1.100"
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
